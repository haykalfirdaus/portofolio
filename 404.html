<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="error-container">
        <h1>404</h1>
        <h2>Oops! Nyasar ya?</h2>
        <p>Halaman yang kamu cari tidak ditemukan, mungkin sudah dihapus atau URL-nya salah.</p>
        
        <div class="btn-grup">
            <button onclick="window.history.back()" class="btn-kembali">Kembali ke Sebelumnya</button>
            <a href="/" class="btn-kembali">Ke Beranda</a>
        </div>
    </div>

</body>
</html>
